name: CI (pnpm) - Build

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    # Definir las variables de entorno a nivel de job para que estén disponibles en todos los pasos
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Install pnpm (action)
        uses: pnpm/action-setup@v2
        with:
          version: 8.x

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Verify Notion secrets
        shell: bash
        run: |
          if [ -z "$NOTION_TOKEN" ]; then
            echo "❌ Error: NOTION_TOKEN no está definido"
            exit 1
          fi
          if [ -z "$NOTION_DATABASE_ID" ]; then
            echo "❌ Error: NOTION_DATABASE_ID no está definido"
            exit 1
          fi
          echo "✅ Secrets verificados correctamente"

      - name: Generate project data from Notion
        run: pnpm generate

      - name: Verify generated files
        shell: bash
        run: |
          if [ ! -f "src/data/projects.json" ]; then
            echo "❌ Error: src/data/projects.json no se generó"
            exit 1
          fi

          PROJECT_COUNT=$(ls -1 src/content/project/*.md 2>/dev/null | wc -l)
          if [ "$PROJECT_COUNT" -eq 0 ]; then
            echo "❌ Error: No se generaron archivos markdown de proyectos"
            exit 1
          fi

          echo "✅ Archivos generados correctamente:"
          echo "   - projects.json: $(wc -l < src/data/projects.json) líneas"
          echo "   - $PROJECT_COUNT archivos markdown de proyectos"
          ls -lh src/content/project/ || true

      - name: Build Astro site
        run: pnpm build

      - name: Verify build output
        shell: bash
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Build failed: dist folder not found"
            exit 1
          fi

          echo "✅ Build completado exitosamente"
          echo "Contenido de dist:"
          ls -lh dist/ || true



